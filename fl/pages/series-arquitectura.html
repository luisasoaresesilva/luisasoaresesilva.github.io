<!doctype html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>Arquitectura – Luísa Soares e Silva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin: 0; background: #000; }
        .slideshow-container {
            position: relative;
            max-width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slide {
            display: none;
            height: 100vh;
            width: 100%;
        }

        .slide img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            background: black;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            padding: 20px;
            color: white;
            font-size: 40px;
            user-select: none;
            transform: translateY(-50%);
        }

        .prev { left: 20px; }
        .next { right: 20px; }

        .prev:hover, .next:hover {
            color: #ccc;
        }

        .back {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            text-decoration: none;
            background: rgba(0,0,0,0.4);
            padding: 10px 15px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<a class="back" href="../index.html">← Voltar</a>

<div class="slideshow-container">

    <div class="slide">
        <img src="../images/arquitectura/arq1.jpg" alt="">
    </div>

    <div class="slide">
        <img src="../images/arquitectura/arq2.jpg" alt="">
    </div>

    <div class="slide">
        <img src="../images/arquitectura/arq3.jpg" alt="">
    </div>

    <div class="slide">
        <img src="../images/arquitectura/arq4.jpg" alt="">
    </div>

    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>

</div>

<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
    showSlides(slideIndex += n);
}

function showSlides(n) {
    let i;
    let slides = document.getElementsByClassName("slide");
    if (n > slides.length) { slideIndex = 1 }
    if (n < 1) { slideIndex = slides.length }
    for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }
    slides[slideIndex - 1].style.display = "block";
}

// Navegação por teclado
document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowRight") plusSlides(1);
    if (e.key === "ArrowLeft") plusSlides(-1);
});
</script>

</body>
</html>
