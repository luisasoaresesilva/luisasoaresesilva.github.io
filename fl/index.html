<head>

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <!-- FONT AWESOME -->
    <script src="https://kit.fontawesome.com/043ae98194.js" crossorigin="anonymous"></script>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CUSTOM CSS -->
    <style>
    
    
        
    html {
    font-size: 60%;
     }
     
    body {
        font-family: 'Roboto Mono', monospace;
        background: #ffffff;
        color: #000;
        margin: 0;
        padding: 0;
    }

    #name h1 a {
        text-decoration: none;
        color: black;
        font-weight: 400;
    }

    .centertext {
        text-align: center;
    }

    #stage {
        margin-top: 40px;
    }

    .workselection {
        margin: 0 auto;
        max-width: 900px;
    }

    ul.workselect {
        list-style: none;
        padding: 0;
    }

    ul.workselect li {
        margin-bottom: 25px;
        position: relative; /* necessário para posicionar a imagem */
    }

    .worklink a {
        font-size: 1.3rem;
        text-decoration: none;
        color: black;
    }

    /* --- IMAGENS ESCONDIDAS E ANIMADAS --- */

    .workselectpic {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        transition: all 0.5s ease;
        width: 250px;     /* tamanho da miniatura */
        height: auto;
        pointer-events: none;
    }

    /* Ímpares → escondidas à esquerda */
    ul.workselect li:nth-child(odd) .workselectpic {
        left: -270px;
    }

    /* Pares → escondidas à direita */
    ul.workselect li:nth-child(even) .workselectpic {
        right: -270px;
    }

    /* Hover: aparecem e deslizam */

    ul.workselect li:nth-child(odd):hover .workselectpic {
        left: 0;
        opacity: 1;
    }

    ul.workselect li:nth-child(even):hover .workselectpic {
        right: 0;
        opacity: 1;
    }
</style>

</head>
